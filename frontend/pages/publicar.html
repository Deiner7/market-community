<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Publicar Producto</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav>

    <h2>MarketCommunity</h2>

    <div>
        <a href="../index.html">Inicio</a>
        <a href="perfil.html">Mi Perfil</a>
        <a href="mensajes.html">Mensajes</a>
    </div>

</nav>

<!-- CONTENEDOR -->
<section class="publicar-container">

    <div class="publicar-card">

        <h1>Publicar Prenda</h1>

        <p class="publicar-subtitulo">
            Comparte ropa de segunda mano con la comunidad
        </p>

        <!-- FORM REAL -->
        <form
            action="../../backend/publicar.php"
            method="POST"
            enctype="multipart/form-data"
            class="form-publicar"
        >

            <!-- TITULO -->
            <div class="input-group">

                <label>Título</label>

                <input
                    type="text"
                    name="titulo"
                    placeholder="Ej: Camisa Oversize Nike"
                    required
                >

            </div>

            <!-- DESCRIPCIÓN -->
            <div class="input-group">

                <label>Descripción</label>

                <textarea
                    name="descripcion"
                    placeholder="Describe el estado, talla y detalles..."
                    required
                ></textarea>

            </div>

            <!-- PRECIO -->
            <div class="input-group">

                <label>Precio</label>

                <input
                    type="number"
                    name="precio"
                    placeholder="Ej: 50000"
                    required
                >

            </div>

            <!-- IMAGEN -->
            <div class="input-group">

                <label>Imagen</label>

                <input
                    type="file"
                    name="imagen"
                    accept="image/*"
                    required
                >

            </div>

            <button type="submit" class="btn-publicar">
                 Publicar Producto
            </button>

        </form>

    </div>

</section>

<script src="../js/producto.js"></script>

</body>
</html>
