<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Chat</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

    <div class="logo">
        MarketCommunity
    </div>

    <div class="nav-links">
        <a href="../index.html">Inicio</a>
        <a href="mensajes.html">Mensajes</a>
    </div>

</nav>

<!-- CHAT CONTAINER -->
<section class="chat-container">

    <!-- HEADER -->
    <div class="chat-header">

        <div class="chat-user">

            <div class="chat-avatar">
                👤
            </div>

            <div>

                <h2 id="nombre-usuario">
                    Chat
                </h2>

                <p id="estado-usuario"></p>

            </div>

        </div>

    </div>

    <!-- MENSAJES -->
    <div id="chat"></div>

    <!-- INPUT -->
    <div class="chat-input-container">

        <textarea
            id="mensaje"
            placeholder="Escribe un mensaje..."
        ></textarea>

        <button onclick="enviarMensaje()">
            Enviar
        </button>

    </div>

</section>

<script src="../js/chat.js"></script>

</body>
</html>
